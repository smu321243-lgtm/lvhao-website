<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>🏋️ 农活健身挑战 — 绿豪农业</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow-x:hidden;color:#fff;user-select:none;-webkit-user-select:none}
.container{max-width:500px;margin:0 auto;padding:20px}

/* Header */
.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#FFD700,#FF6B35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:rgba(255,255,255,.5);font-size:13px;margin-top:4px}

/* Stats row */
.stats-row{display:flex;justify-content:center;gap:24px;margin:16px 0}
.stat-box{text-align:center;background:rgba(255,255,255,.06);padding:12px 20px;border-radius:16px;min-width:80px}
.stat-box .val{font-size:28px;font-weight:800;color:#FFD700;font-family:monospace}
.stat-box .lbl{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}

/* Timer ring */
.timer-ring{position:relative;width:140px;height:140px;margin:20px auto}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:8}
.timer-ring .fg{fill:none;stroke:#44c06d;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .5s}
.timer-ring .fg.warn{stroke:#FFD700}.timer-ring .fg.danger{stroke:#FF4444}
.timer-ring .time-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-ring .time-num{font-size:42px;font-weight:800;font-family:monospace}
.timer-ring .time-label{font-size:11px;color:rgba(255,255,255,.5)}

/* Exercise card */
.exercise-card{background:rgba(255,255,255,.08);border-radius:24px;padding:28px;text-align:center;margin:16px 0;border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(10px)}
.exercise-card .ex-icon{font-size:64px;margin-bottom:8px;animation:bounce .8s ease infinite;display:inline-block}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.exercise-card .ex-name{font-size:22px;font-weight:700;margin-bottom:4px}
.exercise-card .ex-desc{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:16px}
.exercise-card .ex-counter{font-size:16px;color:#FFD700;font-weight:600;margin-bottom:12px}
.exercise-card .ex-hint{font-size:12px;color:rgba(255,255,255,.35)}

/* Tap button */
.tap-zone{width:100%;height:200px;background:rgba(255,255,255,.04);border-radius:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;border:2px dashed rgba(255,255,255,.1);position:relative;overflow:hidden}
.tap-zone:active{background:rgba(68,192,109,.15);border-color:rgba(68,192,109,.4);transform:scale(.97)}
.tap-zone .tap-icon{font-size:48px;pointer-events:none;transition:transform .1s}
.tap-zone:active .tap-icon{transform:scale(1.3)}
.tap-zone .ripple{position:absolute;border-radius:50%;background:rgba(68,192,109,.3);transform:scale(0);animation:ripple .6s ease forwards;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}

/* Progress dots */
.progress-dots{display:flex;justify-content:center;gap:8px;margin:16px 0}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s}
.dot.done{background:#44c06d;box-shadow:0 0 8px rgba(68,192,109,.5)}
.dot.current{background:#FFD700;box-shadow:0 0 12px rgba(255,215,0,.5);transform:scale(1.3)}

/* Buttons */
.btn-row{display:flex;gap:12px;justify-content:center;margin:16px 0}
.btn{padding:14px 32px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;border:none;transition:all .3s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#44c06d,#2d7a48);color:#fff;box-shadow:0 4px 16px rgba(68,192,109,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(68,192,109,.4)}
.btn-secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}
.btn-secondary:hover{background:rgba(255,255,255,.12)}

/* Result overlay */
.result{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(10px)}
.result.show{display:flex}
.result .trophy{font-size:72px;animation:bounce .5s ease infinite}
.result h2{font-size:28px;color:#FFD700}
.result .score-final{font-size:56px;font-weight:800;color:#fff;font-family:monospace}
.result .detail-row{display:flex;gap:20px;color:rgba(255,255,255,.6);font-size:14px}
.result .detail-row span{color:#44c06d;font-weight:600}

/* Calendar heatmap */
.heatmap{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.heatmap .day{width:14px;height:14px;border-radius:3px;background:rgba(255,255,255,.06)}
.heatmap .day.l1{background:rgba(68,192,109,.2)}.heatmap .day.l2{background:rgba(68,192,109,.4)}
.heatmap .day.l3{background:rgba(68,192,109,.7)}.heatmap .day.l4{background:rgba(68,192,109,1);box-shadow:0 0 6px rgba(68,192,109,.5)}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🏋️ 农活也是健身</h1>
    <p>每天一组农活动作，强身健体不花钱</p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="val" id="dayStreak">0</div><div class="lbl">🔥 连续天数</div></div>
    <div class="stat-box"><div class="val" id="totalReps">0</div><div class="lbl">💪 总次数</div></div>
    <div class="stat-box"><div class="val" id="calBurned">0</div><div class="lbl">🔥 消耗千卡</div></div>
  </div>

  <!-- Timer ring -->
  <div class="timer-ring" id="timerRing">
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle class="bg" cx="70" cy="70" r="62"/>
      <circle class="fg" id="timerCircle" cx="70" cy="70" r="62" stroke-dasharray="389.56" stroke-dashoffset="0"/>
    </svg>
    <div class="time-text">
      <div class="time-num" id="timeLeft">30</div>
      <div class="time-label">秒</div>
    </div>
  </div>

  <!-- Exercise -->
  <div class="exercise-card">
    <div class="ex-icon" id="exIcon">🧑‍🌾</div>
    <div class="ex-name" id="exName">准备开始</div>
    <div class="ex-desc" id="exDesc">每天五分钟，农活变健身</div>
    <div class="ex-counter" id="exCounter">点击按钮开始 →</div>
    <div class="ex-hint" id="exHint"></div>
  </div>

  <!-- Tap zone -->
  <div class="tap-zone" id="tapZone">
    <div class="tap-icon" id="tapIcon">👆</div>
  </div>

  <!-- Progress -->
  <div class="progress-dots" id="progressDots"></div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" id="mainBtn" onclick="startWorkout()">💪 开始锻炼</button>
  </div>

  <!-- Heatmap -->
  <div class="heatmap" id="heatmap"></div>
</div>

<!-- Result -->
<div class="result" id="resultOverlay">
  <div class="trophy" id="trophyIcon">🏆</div>
  <h2 id="resultTitle">太棒了！</h2>
  <div class="score-final" id="resultScore">0</div>
  <p style="color:rgba(255,255,255,.6)">次农活动作完成</p>
  <div class="detail-row"><span id="resultReps">0</span> 次动作 · <span id="resultCal">0</span> 千卡 · <span id="resultStreak">0</span>天连续</div>
  <button class="btn btn-primary" onclick="restartWorkout()">🔄 再来一轮</button>
</div>

<script>
// ===== Game State =====
const exercises = [
  {icon:'🧑‍🌾',name:'插秧深蹲',desc:'模拟弯腰插秧 — 标准深蹲动作',hint:'每次点击 = 1次深蹲',cals:0.5},
  {icon:'💪',name:'扛粮弯举',desc:'模拟扛起粮食袋 — 手臂弯举',hint:'每次点击 = 1次弯举',cals:0.3},
  {icon:'🦵',name:'田埂高抬腿',desc:'模拟跨越田埂 — 高抬腿',hint:'每次点击 = 1次高抬腿',cals:0.6},
  {icon:'🏋️',name:'粮仓推举',desc:'模拟将粮袋举上货架 — 肩部推举',hint:'每次点击 = 1次推举',cals:0.4},
  {icon:'🚶',name:'田间步行',desc:'快速点击模拟快步巡视田间',hint:'快速点击！次数越多越好',cals:0.15},
];

let currentEx=0, reps=0, totalReps=0, totalCal=0, seconds=30, timer=null, working=false;
let dayStreak=0, history=[];

// Load saved
try{
  const saved=JSON.parse(localStorage.getItem('lvhao_fitness')||'{}');
  dayStreak=saved.streak||0;history=saved.history||[];totalReps=saved.totalReps||0;totalCal=saved.totalCal||0;
}catch(e){}

document.getElementById('dayStreak').textContent=dayStreak;
document.getElementById('totalReps').textContent=totalReps.toLocaleString();
document.getElementById('calBurned').textContent=Math.floor(totalCal);

// Build heatmap
const heatmap=document.getElementById('heatmap');
const today=new Date().toDateString();
for(let i=13;i>=0;i--){
  const d=new Date(Date.now()-i*86400000);
  const div=document.createElement('div');div.className='day';
  const ds=d.toDateString();
  if(history.includes(ds)){const reps=i===0?20:Math.random()>0.4?Math.floor(5+Math.random()*20):0;if(reps>15)div.classList.add('l4');else if(reps>10)div.classList.add('l3');else if(reps>5)div.classList.add('l2');else div.classList.add('l1')}
  heatmap.appendChild(div);
}

// Build progress dots
const dots=document.getElementById('progressDots');
exercises.forEach((_,i)=>{
  const dot=document.createElement('div');dot.className='dot';dot.id='dot'+i;dots.appendChild(dot);
});

// Tap handler
const tapZone=document.getElementById('tapZone');
const tapIcon=document.getElementById('tapIcon');
tapZone.addEventListener('pointerdown',function(e){
  if(!working)return;
  reps++;
  const ex=exercises[currentEx];
  totalReps++;totalCal+=ex.cals;
  document.getElementById('exCounter').textContent='已完成 '+reps+' 次';
  document.getElementById('totalReps').textContent=totalReps.toLocaleString();
  document.getElementById('calBurned').textContent=Math.floor(totalCal);
  // Ripple
  const ripple=document.createElement('div');ripple.className='ripple';
  const rect=tapZone.getBoundingClientRect();
  ripple.style.left=(e.clientX-rect.left)+'px';ripple.style.top=(e.clientY-rect.top)+'px';
  ripple.style.width=ripple.style.height='20px';
  tapZone.appendChild(ripple);setTimeout(()=>ripple.remove(),600);
  // Bounce
  tapIcon.style.transform='scale(1.3)';setTimeout(()=>tapIcon.style.transform='scale(1)',100);
});

function setExercise(i){
  currentEx=i;
  const ex=exercises[i];
  document.getElementById('exIcon').textContent=ex.icon;
  document.getElementById('exName').textContent=ex.name;
  document.getElementById('exDesc').textContent=ex.desc;
  document.getElementById('exHint').textContent=ex.hint;
  document.getElementById('exCounter').textContent=reps>0?'已完成 '+reps+' 次':'';
  tapIcon.textContent=ex.icon;
  // Dots
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('current',j===i));
}

function updateTimer(){
  seconds--;
  document.getElementById('timeLeft').textContent=seconds;
  const total=30,progress=seconds/total;
  const circle=document.getElementById('timerCircle');
  circle.style.strokeDashoffset=(1-progress)*389.56;
  if(seconds<=10)circle.classList.add('warn');
  if(seconds<=5){circle.classList.remove('warn');circle.classList.add('danger')}
  if(seconds<=0)endWorkout();
}

function startWorkout(){
  working=true;seconds=30;currentEx=0;reps=0;
  document.getElementById('mainBtn').style.display='none';
  document.getElementById('timeLeft').textContent=seconds;
  document.getElementById('timerCircle').style.strokeDashoffset='0';
  document.getElementById('timerCircle').classList.remove('warn','danger');
  tapZone.style.pointerEvents='auto';tapZone.style.opacity='1';
  setExercise(0);
  timer=setInterval(()=>{
    updateTimer();
    // Switch exercise every 6s
    if(seconds%6===0&&seconds<30){
      const nextEx=(currentEx+1)%exercises.length;
      document.getElementById('dot'+currentEx).classList.add('done');
      setExercise(nextEx);
    }
  },1000);
}

function endWorkout(){
  working=false;clearInterval(timer);
  tapZone.style.opacity='.3';tapZone.style.pointerEvents='none';
  document.getElementById('timerCircle').style.strokeDashoffset='389.56';
  document.getElementById('timerCircle').classList.remove('warn','danger');
  document.getElementById('mainBtn').style.display='block';
  document.getElementById('mainBtn').textContent='🔄 再来一轮';
  document.querySelectorAll('.dot').forEach(d=>d.classList.add('done'));
  document.getElementById('exIcon').textContent='🎉';
  document.getElementById('exName').textContent='完成！';
  document.getElementById('exCounter').textContent='共完成 '+reps+' 次动作';
  document.getElementById('exHint').textContent='';

  // Save
  if(!history.includes(today)){history.push(today);dayStreak++}
  try{localStorage.setItem('lvhao_fitness',JSON.stringify({streak:dayStreak,history,totalReps,totalCal}))}catch(e){}
  document.getElementById('dayStreak').textContent=dayStreak;

  // Show result
  let trophy='🏆',title='太棒了！';
  if(reps>=150){trophy='👑';title='农活之王！'}
  else if(reps>=100){trophy='🏆';title='健身达人！'}
  else if(reps>=60){trophy='🌟';title='身手不凡！'}
  else{trophy='💪';title='继续加油！'}
  document.getElementById('trophyIcon').textContent=trophy;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultScore').textContent=reps;
  document.getElementById('resultReps').textContent=reps;
  document.getElementById('resultCal').textContent=Math.floor(totalCal);
  document.getElementById('resultStreak').textContent=dayStreak;
  document.getElementById('resultOverlay').classList.add('show');
}

function restartWorkout(){
  document.getElementById('resultOverlay').classList.remove('show');
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('done','current'));
  startWorkout();
}
</script>
</body>
</html>
