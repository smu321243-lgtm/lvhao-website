<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>🥷 稻谷收割大作战 — 绿豪农业</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#87CEEB 0%,#B8D8F0 30%,#A8C898 50%,#8AB860 100%);min-height:100vh;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#gameWrap{position:relative;width:100%;max-width:500px;height:100vh;max-height:750px;margin:0 auto;overflow:hidden}
/* Score bar */
#hud{position:absolute;top:0;left:0;right:0;z-index:10;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.3);backdrop-filter:blur(8px)}
.hud-item{text-align:center}
.hud-label{font-size:11px;color:rgba(255,255,255,.7);letter-spacing:1px}
.hud-val{font-size:26px;font-weight:800;color:#fff;font-family:monospace}
#combo{color:#FFD700;font-size:16px;font-weight:700;opacity:0;transition:all .3s}
#combo.show{opacity:1}
/* Player (basket) */
#player{position:absolute;bottom:60px;z-index:5;width:80px;height:70px;transform:translateX(-40px);transition:left .05s linear}
#player .basket{width:80px;height:50px;background:linear-gradient(180deg,#D4A054,#B8860B);border-radius:0 0 40px 40px;border:3px solid #8B6914;position:relative}
#player .basket::after{content:'';position:absolute;top:-6px;left:-3px;right:-3px;height:8px;background:#C49A3C;border-radius:4px;border:2px solid #8B6914}
#player .emoji{font-size:28px;text-align:center;line-height:1;margin-bottom:-4px}
/* Falling items */
.falling{position:absolute;z-index:3;font-size:32px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh)}}
/* Particles */
.particle{position:absolute;z-index:4;font-size:20px;pointer-events:none;animation:pop .6s ease forwards}
@keyframes pop{0%{opacity:1;transform:scale(1) translateY(0)}100%{opacity:0;transform:scale(2) translateY(-40px)}}
/* Ground */
#ground{position:absolute;bottom:0;left:0;right:0;height:60px;z-index:2;background:linear-gradient(0deg,#5a8a30,#6a9a38)}
#ground::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15)}
/* Start overlay */
#startOverlay{position:absolute;inset:0;z-index:20;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#startOverlay h2{font-size:36px;color:#FFD700;text-shadow:0 2px 10px rgba(0,0,0,.5)}
#startOverlay p{color:rgba(255,255,255,.8);font-size:15px;text-align:center;line-height:1.8}
#startBtn{padding:16px 48px;font-size:20px;font-weight:700;background:linear-gradient(135deg,#FFD700,#FFA500);color:#5a3a00;border:none;border-radius:50px;cursor:pointer;box-shadow:0 6px 24px rgba(255,165,0,.4);transition:all .3s}
#startBtn:active{transform:scale(.95)}#startBtn:hover{transform:translateY(-2px)}
/* Game Over */
#gameOver{position:absolute;inset:0;z-index:20;background:rgba(0,0,0,.75);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#gameOver h2{font-size:32px;color:#fff}
#gameOver .final{font-size:48px;font-weight:800;color:#FFD700}
#gameOver p{color:rgba(255,255,255,.6)}
#restartBtn{padding:14px 40px;font-size:18px;font-weight:700;background:#44c06d;color:#fff;border:none;border-radius:50px;cursor:pointer}
/* Mobile hint */
.mobile-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:11px}
</style>
</head>
<body>

<div id="gameWrap">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-item"><div class="hud-label">🌾 收割</div><div class="hud-val" id="score">0</div></div>
    <div id="combo">COMBO x1</div>
    <div class="hud-item"><div class="hud-label">⏱️ 时间</div><div class="hud-val" id="timer">60</div></div>
    <div class="hud-item"><div class="hud-label">🏆 最高</div><div class="hud-val" id="best">0</div></div>
  </div>

  <!-- Player -->
  <div id="player">
    <div class="emoji">🧑‍🌾</div>
    <div class="basket"></div>
  </div>

  <!-- Ground -->
  <div id="ground"></div>

  <!-- Start -->
  <div id="startOverlay">
    <h2>🌾 稻谷收割大作战</h2>
    <p>👆 移动鼠标 / 手指滑动<br>接住金色稻谷 🌾 避开石头 🪨</p>
    <button id="startBtn" onclick="startGame()">开始收割！</button>
  </div>

  <!-- Game Over -->
  <div id="gameOver">
    <div class="final" id="finalScore">0</div>
    <p>斤稻谷</p>
    <p id="grade">🌱</p>
    <button id="restartBtn" onclick="restartGame()">再来一局 🔄</button>
  </div>

  <div class="mobile-hint">左右滑动控制 👆</div>
</div>

<script>
// Game state
let score=0,time=60,combo=0,maxCombo=0,best=0,playing=false,gameLoop,spawnLoop,timerLoop;
const player=document.getElementById('player');
const scoreEl=document.getElementById('score');
const timerEl=document.getElementById('timer');
const bestEl=document.getElementById('best');
const comboEl=document.getElementById('combo');
const gameOver=document.getElementById('gameOver');
const startOverlay=document.getElementById('startOverlay');
const finalScore=document.getElementById('finalScore');
const grade=document.getElementById('grade');
const wrap=document.getElementById('gameWrap');
let playerX=250,wrapW=500;

// Load best
try{best=parseInt(localStorage.getItem('lvhao_best')||'0')}catch(e){}
bestEl.textContent=best;

function resize(){wrapW=wrap.clientWidth;playerX=wrapW/2;player.style.left=playerX+'px'}
window.addEventListener('resize',resize);

// Controls
function moveTo(x){playerX=Math.max(40,Math.min(x,wrapW-40));player.style.left=playerX+'px'}
wrap.addEventListener('mousemove',e=>{if(playing)moveTo(e.clientX-wrap.getBoundingClientRect().left)});
wrap.addEventListener('touchmove',e=>{if(playing){e.preventDefault();moveTo(e.touches[0].clientX-wrap.getBoundingClientRect().left)}},{passive:false});
wrap.addEventListener('touchstart',e=>{if(playing)moveTo(e.touches[0].clientX-wrap.getBoundingClientRect().left)});

function spawnItem(){
  if(!playing)return;
  const isGood=Math.random()<0.68;
  const el=document.createElement('div');
  el.className='falling';
  el.textContent=isGood?'🌾':(Math.random()<.5?'🪨':'🐛');
  el.setAttribute('data-type',isGood?'good':'bad');
  const x=30+Math.random()*(wrapW-60);
  el.style.left=x+'px';
  el.style.top='-40px';
  const speed=1.8+Math.random()*2.5;
  el.style.animationDuration=speed+'s';
  wrap.appendChild(el);

  // Collision check
  const check=setInterval(()=>{
    if(!playing){clearInterval(check);return}
    const rect=el.getBoundingClientRect();
    const pRect=player.getBoundingClientRect();
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    if(cy>pRect.top&&cy<pRect.bottom&&cx>pRect.left&&cx<pRect.right){
      clearInterval(check);
      el.remove();
      if(el.getAttribute('data-type')==='good'){
        combo++;if(combo>maxCombo)maxCombo=combo;
        const pts=10+(combo>5?5:0)+(combo>10?10:0);
        score+=pts;
        if(combo>1){comboEl.textContent='COMBO x'+combo;comboEl.classList.add('show');setTimeout(()=>comboEl.classList.remove('show'),800)}
        // Particle
        const p=document.createElement('div');p.className='particle';
        p.textContent='+'+pts;p.style.left=rect.left+'px';p.style.top=rect.top+'px';
        wrap.appendChild(p);setTimeout(()=>p.remove(),600);
      }else{
        combo=0;comboEl.classList.remove('show');
        score=Math.max(0,score-15);
        // Shake
        player.style.transform='translateX(-40px) rotate(-5deg)';setTimeout(()=>player.style.transform='translateX(-40px) rotate(5deg)',100);setTimeout(()=>player.style.transform='translateX(-40px) rotate(0)',200);
      }
      scoreEl.textContent=score;
    }
    const r2=el.getBoundingClientRect();
    if(r2.top>window.innerHeight){clearInterval(check);el.remove();if(el.getAttribute('data-type')==='good'){combo=0;comboEl.classList.remove('show')}}
  },50);
}

function updateTimer(){
  if(!playing)return;
  time--;timerEl.textContent=time;
  if(time<=10)timerEl.style.color='#FF6B6B';
  if(time<=0)endGame();
}

function startGame(){
  score=0;time=60;combo=0;maxCombo=0;playing=true;
  scoreEl.textContent='0';timerEl.textContent='60';timerEl.style.color='#fff';comboEl.classList.remove('show');
  startOverlay.style.display='none';gameOver.style.display='none';
  resize();
  // Clear old items
  wrap.querySelectorAll('.falling,.particle').forEach(e=>e.remove());
  spawnLoop=setInterval(spawnItem,800);
  timerLoop=setInterval(updateTimer,1000);
}

function endGame(){
  playing=false;
  clearInterval(spawnLoop);clearInterval(timerLoop);
  gameOver.style.display='flex';
  finalScore.textContent=score;
  // Grade
  let g;if(score>=800)g='🏆 收割大师！';else if(score>=500)g='🌟 农活好手！';else if(score>=250)g='🌾 勤劳农夫';else g='🌱 继续加油';
  grade.textContent=g;
  if(score>best){best=score;bestEl.textContent=best;try{localStorage.setItem('lvhao_best',best)}catch(e){}}
}

function restartGame(){startGame()}

resize();
</script>
</body>
</html>
